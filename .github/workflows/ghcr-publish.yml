name: Publish GHCR image

on:
  release:
    types: [published]
  push:
    tags:
      - 'dev-*'
      - 'v*-beta*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag override (e.g. v0.9.6, dev-v0.9.28-1, or v0.9.28-beta.1)'
        required: false

permissions:
  contents: read
  packages: write

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.resolve.outputs.image }}
      semver: ${{ steps.resolve.outputs.semver }}
      channel: ${{ steps.resolve.outputs.channel }}
    steps:
      - name: Resolve image tag
        id: resolve
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if [ -n "${INPUT_TAG}" ]; then
            TAG="${INPUT_TAG}"
          elif [ -n "${RELEASE_TAG}" ]; then
            TAG="${RELEASE_TAG}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          if [ -z "${TAG}" ]; then
            echo "::error::Could not resolve an image tag" >&2
            exit 1
          fi

          IMAGE_REPO="$(printf '%s' "${REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "image=ghcr.io/${IMAGE_REPO}" >> "$GITHUB_OUTPUT"

          if [[ "${TAG}" == dev-* ]]; then
            echo "semver=${TAG}" >> "$GITHUB_OUTPUT"
            echo "channel=dev" >> "$GITHUB_OUTPUT"
          elif [[ "${TAG}" == *beta* ]]; then
            echo "semver=${TAG#v}" >> "$GITHUB_OUTPUT"
            echo "channel=beta" >> "$GITHUB_OUTPUT"
          else
            echo "semver=${TAG#v}" >> "$GITHUB_OUTPUT"
            echo "channel=latest" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ needs.meta.outputs.image }}:${{ needs.meta.outputs.semver }}-${{ matrix.suffix }}
          cache-from: type=gha,scope=ghcr-${{ matrix.suffix }}
          cache-to: type=gha,scope=ghcr-${{ matrix.suffix }},mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.meta.outputs.semver }}
            org.opencontainers.image.revision=${{ github.sha }}

  merge:
    needs: [meta, build]
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push multi-platform manifest
        run: |
          IMG="${{ needs.meta.outputs.image }}"
          VER="${{ needs.meta.outputs.semver }}"
          CHANNEL="${{ needs.meta.outputs.channel }}"

          docker buildx imagetools create \
            -t "${IMG}:${VER}" \
            -t "${IMG}:${CHANNEL}" \
            "${IMG}:${VER}-amd64" \
            "${IMG}:${VER}-arm64"

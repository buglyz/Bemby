services:
  - type: web
    name: bemby
    runtime: docker
    plan: free
    envVars:
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
    disk:
      name: bemby-data
      mountPath: /app/data
      sizeGB: 1
